<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; connect-src 'self' https://hgjaqurtcqkratbkqrgp.supabase.co https://*.supabase.co https://cdn.jsdelivr.net; img-src 'self' data: https:;">
  <title>Sign In - Wonderful Auto & Tech</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="../index.html" class="logo">
          <i class="fas fa-laptop"></i>
          <span>Wonderful Auto & Tech</span>
        </a>
        <nav class="nav" id="navMenu">
          <a href="../index.html" class="nav-link">Home</a>
          <a href="products.html" class="nav-link">Products</a>
          <a href="cart.html" class="nav-link">Cart <span id="cartCount" class="cart-badge">0</span></a>
        </nav>
        <button class="menu-toggle" id="menuToggle">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="auth-page">
    <div class="container">
      <div class="auth-card">
        <div class="auth-header">
          <h1>Sign In</h1>
          <p>Welcome back! Please sign in to your account.</p>
        </div>

        <div class="alert alert-error" id="errorMsg" style="display: none;"></div>
        <div class="alert alert-success" id="successMsg" style="display: none;"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required placeholder="your@email.com">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter your password">
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
            Sign In
          </button>
        </form>

        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Sign Up</a></p>
        </div>
      </div>
    </div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app.js"></script>
</body>
</html>
